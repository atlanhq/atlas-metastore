name: Integration Tests

on:
  pull_request:
    branches:
      - master
      - beta
      - staging
    paths-ignore:
      - '.claude/**'
      - '.cursor/**'
      - '.github/**'
      - 'docs/**'
      - 'helm/**'
      - 'local-dev/**'
      - 'README.txt'
      - 'README.md'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ============================================
      # DISK CLEANUP - Testcontainers need space
      # ============================================
      - name: Free up disk space
        run: |
          echo "Freeing disk space..."
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true

      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-integration-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-integration-
            ${{ runner.os }}-maven-

      - name: Create Maven Settings
        uses: s4u/maven-settings-action@v2.8.0
        with:
          servers: |
            [{
                "id": "github",
                "username": "atlan-ci",
                "password": "${{ secrets.ORG_PAT_GITHUB }}"
            }]

      - name: Verify Docker
        run: |
          docker --version
          docker info

      - name: Run integration tests
        id: tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_CHECKS_DISABLE: true
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          set +e
          mvn verify \
            -Drat.skip=true \
            2>&1 | tee test-output.log

          # Capture exit code from mvn (not tee)
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Discover test reports
        id: discover-test-reports
        if: always() && steps.tests.outcome != 'skipped'
        run: |
          mapfile -t reports < <(find . -type f \( -path "*/target/failsafe-reports/TEST-*.xml" -o -path "*/target/surefire-reports/TEST-*.xml" \))

          if [ ${#reports[@]} -gt 0 ]; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#reports[@]} test report file(s)."
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            echo "No JUnit XML files found under */target/{failsafe,surefire}-reports."
          fi

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always() && steps.tests.outcome != 'skipped' && steps.discover-test-reports.outputs.has_reports == 'true'
        with:
          name: Integration Test Results
          path: |
            **/target/failsafe-reports/TEST-*.xml
            **/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Summarize integration test run
        if: always() && steps.tests.outcome != 'skipped'
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          mapfile -t summaries < <(find . -type f -path "*/target/failsafe-reports/failsafe-summary.xml")
          if [ ${#summaries[@]} -gt 0 ]; then
            for summary in "${summaries[@]}"; do
              echo "### ${summary}" >> $GITHUB_STEP_SUMMARY
              cat "${summary}" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No failsafe summary found. Check artifacts for raw reports." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always() && steps.tests.outcome != 'skipped'
        with:
          name: integration-test-reports-${{ github.run_id }}
          path: |
            **/target/failsafe-reports/
            **/target/surefire-reports/
            test-output.log
          retention-days: 14
