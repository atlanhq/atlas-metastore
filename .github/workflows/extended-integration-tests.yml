# SPDX-License-Identifier: Apache-2.0
# Extended Integration Tests - Atlas + Atlan-Java Test Suites

name: Extended Integration Tests

on:
  push:
    branches:
      - atlas_ci_cd_updates

jobs:
  extended-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours for all 39 tests (was 60)
    
    steps:
      - name: Checkout atlas-metastore
        uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Run extended integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
          GITHUB_USERNAME: ${{ github.actor }}
        run: |
          chmod +x ./run-extended-integration-tests.sh ./build.sh
          
          # Run ALL atlan-java tests (39 test classes)
          # This will take ~2-3 hours but provides comprehensive coverage
          ./run-extended-integration-tests.sh --tests all
      
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            target/test-logs/
            /tmp/atlan-java-*/integration-tests/build/reports/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            /tmp/atlan-java-*/integration-tests/build/test-results/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: Extended Integration Test Report
          fail_on_failure: true
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const testResults = `
            ## Extended Integration Tests Results
            
            ✅ **Atlas-metastore tests**: Passed
            ✅ **Atlan-java tests**: Passed
            
            See artifacts for detailed logs.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testResults
            });

