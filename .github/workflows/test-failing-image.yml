name: Test Failing Image (c983751abcd)

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - mlh_1379 # Or any test branch

jobs:
  test-failing-image:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master
          install: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Login to GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: atlan-ci
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Pull the failing image
        run: |
          echo "Pulling the failing beta image that reproduces the Azure issue..."
          docker pull ghcr.io/atlanhq/atlas-metastore-beta:c983751abcd
          
      - name: Retag image for tests
        run: |
          echo "Retagging image to atlanhq/atlas:test..."
          docker tag ghcr.io/atlanhq/atlas-metastore-beta:c983751abcd atlanhq/atlas:test
          docker images | grep atlas

      - name: Create Maven Settings
        uses: s4u/maven-settings-action@v2.8.0
        with:
          servers: |
            [{
                "id": "github",
                "username": "atlan-ci",
                "password": "${{ secrets.ORG_PAT_GITHUB }}"
            }]

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build project (compile only, skip tests)
        run: |
          echo "Building project to compile test classes..."
          mvn clean install -DskipTests -Dmaven.javadoc.skip=true -B -V

      - name: Start Integration Tests with Failing Image (Background)
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_CHECKS_DISABLE: true
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          echo "=========================================="
          echo "Running tests with FAILING IMAGE"
          echo "=========================================="
          echo ""
          echo "⚠️  If this test FAILS → GitHub Actions CAN catch the bug ✅"
          echo "⚠️  If this test PASSES → GitHub Actions CANNOT catch the bug ❌"
          echo ""
          
          # Run tests in background so we can debug while they run
          nohup mvn test -pl webapp \
               -Dsurefire.useFile=false \
               -Dorg.slf4j.simpleLogger.defaultLogLevel=info > test-output.log 2>&1 &
          
          echo $! > test-pid.txt
          echo "Tests started with PID: $(cat test-pid.txt)"
          
          # Wait a bit for containers to start
          sleep 60
          
          echo ""
          echo "Containers running:"
          docker ps -a
          
      - name: Setup tmate session for debugging
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
          
      - name: Wait for tests to complete
        if: always()
        run: |
          if [ -f test-pid.txt ]; then
            TEST_PID=$(cat test-pid.txt)
            echo "Waiting for test process (PID: $TEST_PID) to complete..."
            wait $TEST_PID || true
            TEST_RESULT=$?
          else
            TEST_RESULT=1
          fi
          
          # Show test output
          if [ -f test-output.log ]; then
            echo ""
            echo "=========================================="
            echo "Test Output:"
            echo "=========================================="
            cat test-output.log
          fi
          
          set -e
          
          echo ""
          echo "=========================================="
          if [ $TEST_RESULT -ne 0 ]; then
            echo "❌ TESTS FAILED (Expected!)"
            echo "✅ GOOD: GitHub Actions CAN reproduce the Azure bug!"
            echo "✅ Current integration test setup is viable"
          else
            echo "✅ TESTS PASSED (Unexpected!)"
            echo "❌ BAD: GitHub Actions CANNOT reproduce the Azure bug"
            echo "❌ Need cloud-specific runners (Option 3/4)"
          fi
          echo "=========================================="
          
          # Exit with the actual test result
          exit $TEST_RESULT

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            target/surefire-reports/
            target/test-logs/
          retention-days: 5

      - name: Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested image: \`ghcr.io/atlanhq/atlas-metastore-beta:c983751abcd\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'failure' ]; then
            echo "✅ **GitHub Actions CAN catch this bug!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The failing image reproduced the issue in GitHub Actions." >> $GITHUB_STEP_SUMMARY
            echo "Current integration test setup is sufficient." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **GitHub Actions CANNOT catch this bug**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The failing image did NOT reproduce the issue in GitHub Actions." >> $GITHUB_STEP_SUMMARY
            echo "Need cloud-specific runners (k3s/AKS on Azure)." >> $GITHUB_STEP_SUMMARY
          fi

