name: Multi-Cloud Image Testing

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - mlh_1379 # Or any test branch

jobs:
  test-images:
    name: Test ${{ matrix.image-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Continue testing other images even if one fails
      matrix:
        include:
          - image-name: "Failing Image"
            image-tag: "c983751abcd"
            expected-result: "fail"
            enable-tmate: true
          - image-name: "Working Image (Latest Beta)"
            image-tag: "1e2539e53"
            expected-result: "pass"
            enable-tmate: true
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master
          install: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Login to GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: atlan-ci
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Pull the test image
        run: |
          echo "Pulling image: ghcr.io/atlanhq/atlas-metastore-beta:${{ matrix.image-tag }}"
          docker pull ghcr.io/atlanhq/atlas-metastore-beta:${{ matrix.image-tag }}
          
      - name: Retag image for tests
        run: |
          echo "Retagging image to atlanhq/atlas:test..."
          docker tag ghcr.io/atlanhq/atlas-metastore-beta:${{ matrix.image-tag }} atlanhq/atlas:test
          docker images | grep atlas

      - name: Create Maven Settings
        uses: s4u/maven-settings-action@v2.8.0
        with:
          servers: |
            [{
                "id": "github",
                "username": "atlan-ci",
                "password": "${{ secrets.ORG_PAT_GITHUB }}"
            }]

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build project (compile only, skip tests)
        run: |
          echo "Building project to compile test classes..."
          mvn clean install -DskipTests -Dmaven.javadoc.skip=true -B -V

      - name: Start Integration Tests (Background)
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_CHECKS_DISABLE: true
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          echo "=========================================="
          echo "Running tests with: ${{ matrix.image-name }}"
          echo "Image tag: ${{ matrix.image-tag }}"
          echo "Expected result: ${{ matrix.expected-result }}"
          echo "=========================================="
          echo ""
          
          # Run tests in background so we can debug while they run
          nohup mvn test -pl webapp \
               -Dsurefire.useFile=false \
               -Dorg.slf4j.simpleLogger.defaultLogLevel=info > test-output.log 2>&1 &
          
          echo $! > test-pid.txt
          echo "Tests started with PID: $(cat test-pid.txt)"
          
          # Wait for dependencies to start, then Atlas
          echo ""
          echo "Waiting for dependencies to start (Zookeeper, Kafka, Cassandra, ES, Redis)..."
          sleep 90
          
          echo ""
          echo "Containers running after 90 seconds:"
          docker ps -a
          
          # Wait for Atlas container to appear
          echo ""
          echo "Waiting for Atlas container to start..."
          for i in {1..30}; do
            if docker ps -a | grep -q "atlanhq/atlas:test"; then
              echo "✅ Atlas container started!"
              break
            fi
            echo "Attempt $i/30: Atlas container not found yet, waiting 10 seconds..."
            sleep 10
          done
          
          echo ""
          echo "Final container status:"
          docker ps -a
          
          # Get Atlas container ID if it exists
          ATLAS_CONTAINER=$(docker ps -a --filter ancestor=atlanhq/atlas:test --format "{{.ID}}" | head -1)
          if [ -n "$ATLAS_CONTAINER" ]; then
            echo ""
            echo "================================================"
            echo "Atlas Container ID: $ATLAS_CONTAINER"
            echo "================================================"
            echo ""
            echo "To view logs during tmate session, run:"
            echo "  docker logs -f $ATLAS_CONTAINER"
            echo ""
            echo "To exec into container:"
            echo "  docker exec -it $ATLAS_CONTAINER bash"
            echo "================================================"
          else
            echo "⚠️  Atlas container not found yet - it may still be starting"
          fi
          
      - name: Setup tmate session for debugging
        if: ${{ matrix.enable-tmate }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
          
      - name: Wait for tests to complete
        if: always()
        run: |
          if [ -f test-pid.txt ]; then
            TEST_PID=$(cat test-pid.txt)
            echo "Waiting for test process (PID: $TEST_PID) to complete..."
            wait $TEST_PID || true
            TEST_RESULT=$?
          else
            TEST_RESULT=1
          fi
          
          # Show test output
          if [ -f test-output.log ]; then
            echo ""
            echo "=========================================="
            echo "Test Output:"
            echo "=========================================="
            cat test-output.log
          fi
          
          set -e
          
          echo ""
          echo "=========================================="
          echo "Test completed for: ${{ matrix.image-name }}"
          if [ $TEST_RESULT -ne 0 ]; then
            echo "❌ TESTS FAILED"
            if [ "${{ matrix.expected-result }}" == "fail" ]; then
              echo "✅ Expected result! Bug is reproducible."
            else
              echo "⚠️ Unexpected! This image should work."
            fi
          else
            echo "✅ TESTS PASSED"
            if [ "${{ matrix.expected-result }}" == "pass" ]; then
              echo "✅ Expected result! Image is working correctly."
            else
              echo "⚠️ Unexpected! Bug was not reproduced."
            fi
          fi
          echo "=========================================="
          
          # Exit with the actual test result (but allow workflow to continue)
          # We'll check expected vs actual in the summary
          exit 0

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            target/surefire-reports/
            target/test-logs/
          retention-days: 5

      - name: Summary
        if: always()
        run: |
          echo "## ${{ matrix.image-name }} Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/atlanhq/atlas-metastore-beta:${{ matrix.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Expected:** ${{ matrix.expected-result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check test results from file
          if [ -f test-output.log ] && grep -q "BUILD FAILURE" test-output.log; then
            TEST_FAILED=true
          else
            TEST_FAILED=false
          fi
          
          if [ "$TEST_FAILED" == "true" ]; then
            echo "**Result:** ❌ FAILED" >> $GITHUB_STEP_SUMMARY
            if [ "${{ matrix.expected-result }}" == "fail" ]; then
              echo "**Status:** ✅ Expected - Bug reproduced successfully!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "GitHub Actions successfully caught the bug on Azure infrastructure." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status:** ⚠️ Unexpected - This image should work!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Result:** ✅ PASSED" >> $GITHUB_STEP_SUMMARY
            if [ "${{ matrix.expected-result }}" == "pass" ]; then
              echo "**Status:** ✅ Expected - Image is working correctly!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "This image is safe to deploy to fix Azure production issues." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status:** ⚠️ Unexpected - Bug was not reproduced!" >> $GITHUB_STEP_SUMMARY
            fi
          fi

