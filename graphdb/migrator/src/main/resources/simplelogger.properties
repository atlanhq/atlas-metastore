# =============================================================================
# SLF4J Simple Logger Configuration
# =============================================================================
# Default log level for all loggers (INFO, DEBUG, TRACE, WARN, ERROR)
org.slf4j.simpleLogger.defaultLogLevel=INFO

# Show date-time in log output
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread name
org.slf4j.simpleLogger.showThreadName=true

# Show short logger name (class name only, not fully qualified)
org.slf4j.simpleLogger.showShortLogName=true

# --- Suppress noisy libraries ---

# Cassandra driver: extremely chatty — logs full CQL query text + all bound values
# for every batch that generates a server-side warning (unlogged batch spanning partitions).
# These WARN-level logs from CqlRequestHandler print entire vertex properties, making
# output unreadable. Set to ERROR to suppress batch partition warnings.
org.slf4j.simpleLogger.log.com.datastax.oss.driver=ERROR
org.slf4j.simpleLogger.log.com.datastax.oss.driver.internal=ERROR
org.slf4j.simpleLogger.log.com.datastax.oss.driver.internal.core.cql=ERROR

# JanusGraph internals: verbose at INFO during schema resolution
org.slf4j.simpleLogger.log.org.janusgraph=WARN
org.slf4j.simpleLogger.log.org.janusgraph.graphdb.database.management=WARN
org.slf4j.simpleLogger.log.org.janusgraph.diskstorage=WARN

# TinkerPop/Gremlin: not used directly but JG pulls it in
org.slf4j.simpleLogger.log.org.apache.tinkerpop=WARN

# ES REST client: logs every request at DEBUG, warnings at INFO
org.slf4j.simpleLogger.log.org.elasticsearch.client=WARN

# Netty (transitive via Cassandra driver)
org.slf4j.simpleLogger.log.io.netty=WARN

# gRPC (transitive via Temporal SDK)
org.slf4j.simpleLogger.log.io.grpc=WARN

# Temporal SDK
org.slf4j.simpleLogger.log.io.temporal=WARN
